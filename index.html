<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Letters Drop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-container">
    <h1>LETTERS DROP</h1>

    <div class="top-bar">
      <div class="stat-box">
        <span class="label">Score</span>
        <span id="score">0</span>
      </div>

      <div class="stat-box">
        <span class="label">Level</span>
        <span id="level">1</span>
      </div>

      <div class="stat-box next-letter-btn" onclick="dropNextLetter()">
        <div class="label">NEXT</div>
        <div class="value">LETTER</div>
      </div>
    </div>

    <div id="message" class="message">Press Start</div>

    <div id="board" class="board"></div>

    <div class="controls-row">
      <button id="startBtn" class="main-btn" onclick="startGame()">Start Game</button>
    </div>
  </div>

  <script src="dictionary.js"></script>
  <script src="game.js"></script>
</body>
</html>
